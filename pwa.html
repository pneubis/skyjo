<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1035; }

  #splash {
    position: fixed; inset: 0;
    background: #1a1035;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
    font-family: Georgia, serif;
  }

  .cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 96px;
    animation: float 2.5s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .card {
    height: 58px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  .ca { background: #fff; color: #1a1035; }
  .cb { background: #ff5d5d; color: #fff; }
  .cc { background: #5db5ff; color: #fff; }
  .cd { background: #6dff93; color: #1a1035; }

  h1 {
    font-size: 36px; letter-spacing: 8px;
    text-transform: uppercase; color: #f0ecff;
  }

  .loader {
    width: 56px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px; overflow: hidden;
  }
  .loader::after {
    content: ''; display: block; height: 100%; width: 40%;
    background: #7c5cfc; border-radius: 3px;
    animation: slide 1s ease-in-out infinite;
  }
  @keyframes slide { 0%{transform:translateX(-200%)} 100%{transform:translateX(500%)} }

  .launch-btn {
    margin-top: 8px;
    background: #7c5cfc; color: #fff;
    border: none; padding: 16px 40px;
    border-radius: 50px;
    font-family: Georgia, serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 6px 28px rgba(124,92,252,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
    display: none;
  }
  .launch-btn:active { transform: scale(0.96); }

  /* Install banner */
  #install-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: none; align-items: center; gap: 14px;
    padding: 16px 20px 28px;
    background: rgba(15, 8, 40, 0.98);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(124,92,252,0.3);
    z-index: 999;
    animation: up 0.3s ease both;
  }
  @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .ib-icon {
    width: 50px; height: 50px; border-radius: 12px;
    background: #7c5cfc; display: flex; align-items: center;
    justify-content: center; font-size: 24px; flex-shrink: 0;
  }
  .ib-text { flex: 1; }
  .ib-text strong { display: block; color: #f0ecff; font-size: 15px; margin-bottom: 3px; font-family: Georgia, serif; }
  .ib-text span { color: #8b7fc0; font-size: 12px; font-family: sans-serif; }
  .ib-btn {
    background: #7c5cfc; color: #fff; border: none;
    padding: 11px 20px; border-radius: 30px;
    font-weight: 700; font-size: 14px; cursor: pointer;
    font-family: sans-serif; flex-shrink: 0;
  }
  .ib-close {
    background: none; border: none; color: #8b7fc0;
    font-size: 20px; cursor: pointer; flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="splash">
  <div class="cards">
    <div class="card ca">-2</div>
    <div class="card cb">8</div>
    <div class="card cc">5</div>
    <div class="card cd">0</div>
  </div>
  <h1>Skyjo</h1>
  <div class="loader" id="loader"></div>
  <button class="launch-btn" id="launch-btn" onclick="goToGame()">▶ Jouer</button>
</div>

<div id="install-bar">
  <div class="ib-icon">🃏</div>
  <div class="ib-text">
    <strong>Installer Skyjo</strong>
    <span>Ajouter à l'écran d'accueil</span>
  </div>
  <button class="ib-btn" id="ib-install-btn">Installer</button>
  <button class="ib-close" onclick="dismissInstall()">✕</button>
</div>

<script>
const GAME_URL = 'https://pneubis.github.io/skyjo';

// ── MANIFEST (inline blob) ───────────────────────────────────────
const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#1a1035"/><rect x="50" y="50" width="180" height="250" rx="28" fill="#fff"/><rect x="282" y="50" width="180" height="250" rx="28" fill="#ff5d5d"/><rect x="50" y="212" width="180" height="250" rx="28" fill="#5db5ff"/><rect x="282" y="212" width="180" height="250" rx="28" fill="#6dff93"/><text x="140" y="192" text-anchor="middle" font-family="Georgia" font-weight="700" font-size="90" fill="#1a1035">-2</text><text x="372" y="192" text-anchor="middle" font-family="Georgia" font-weight="700" font-size="90" fill="white">8</text><text x="140" y="415" text-anchor="middle" font-family="Georgia" font-weight="700" font-size="90" fill="white">5</text><text x="372" y="415" text-anchor="middle" font-family="Georgia" font-weight="700" font-size="90" fill="#1a1035">0</text></svg>`;
const iconUrl = 'data:image/svg+xml;base64,' + btoa(iconSvg);

const manifest = {
  name: "Skyjo Multijoueur",
  short_name: "Skyjo",
  description: "Jouez au Skyjo en ligne",
  // ← clé du plein écran : start_url pointe vers le JEU directement
  start_url: GAME_URL,
  display: "standalone",       // standalone = plein écran sans barre navigateur
  background_color: "#1a1035",
  theme_color: "#1a1035",
  orientation: "any",
  icons: [
    { src: iconUrl, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
    { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

// ── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', () => clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
    });
  `;
  const swBlob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}

// ── REDIRECT ─────────────────────────────────────────────────────
// Si déjà lancé comme PWA installée → aller direct au jeu
const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                  || window.navigator.standalone === true;
if (isStandalone) {
  window.location.replace(GAME_URL);
}

// Sinon : afficher le splash puis proposer de lancer
function goToGame() {
  window.location.href = GAME_URL;
}

// Après 2s : montrer le bouton "Jouer" si pas encore redirigé
setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('launch-btn').style.display = 'block';
}, 1800);

// ── INSTALL PROMPT ───────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    document.getElementById('install-bar').style.display = 'flex';
  }, 1000);
});

document.getElementById('ib-install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissInstall();
});

window.addEventListener('appinstalled', () => {
  dismissInstall();
});

function dismissInstall() {
  document.getElementById('install-bar').style.display = 'none';
}

// ── iOS hint ─────────────────────────────────────────────────────
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
if (isIos && !window.navigator.standalone) {
  // Réutilise la barre install avec un message iOS
  setTimeout(() => {
    const bar = document.getElementById('install-bar');
    bar.querySelector('.ib-text strong').textContent = 'Installer sur iPhone';
    bar.querySelector('.ib-text span').textContent = 'Appuyez sur □↑ puis "Sur l\'écran d\'accueil"';
    bar.querySelector('.ib-btn').style.display = 'none';
    bar.style.display = 'flex';
  }, 1000);
}
</script>
</body>
</html>
