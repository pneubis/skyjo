<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1035;
    --accent: #7c5cfc;
    --accent2: #ff5d5d;
    --text: #f0ecff;
    --muted: #8b7fc0;
  }

  html {
    height: 100%;
    background: var(--bg);
  }
  body {
    width: 100%;
    /* dvh fills the full viewport on Android including behind status bar */
    height: 100dvh;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Georgia', serif;
    margin: 0;
  }

  /* ── SPLASH / LOADER ── */
  #splash {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.5s, visibility 0.5s;
  }
  #splash.hidden { opacity: 0; visibility: hidden; }

  .splash-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .splash-card {
    height: 56px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .c1 { background: #fff; color: #1a1035; }
  .c2 { background: #ff5d5d; }
  .c3 { background: #5db5ff; }
  .c4 { background: #6dff93; color: #1a1035; }

  .splash-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--text);
  }

  .splash-loader {
    width: 48px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .splash-loader::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: var(--accent);
    border-radius: 3px;
    animation: load 1.2s ease-in-out infinite;
  }
  @keyframes load { 0%{transform:translateX(-150%)} 100%{transform:translateX(350%)} }

  /* ── INSTALL BANNER ── */
  #install-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 150;
    display: none;
    align-items: center;
    gap: 14px;
    padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
    background: rgba(20, 12, 50, 0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(124, 92, 252, 0.3);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
    animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

  .install-icon {
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(124,92,252,0.5);
  }
  .install-text { flex: 1; }
  .install-text strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .install-text span {
    font-size: 12px;
    color: var(--muted);
    font-family: -apple-system, sans-serif;
  }
  .install-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: 30px;
    font-family: -apple-system, sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(124,92,252,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .install-btn:active { transform: scale(0.96); }
  .install-close {
    background: none; border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 6px;
    flex-shrink: 0;
    line-height: 1;
  }

  /* iOS instructions banner */
  #ios-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 150;
    display: none;
    flex-direction: column;
    gap: 12px;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    background: rgba(20, 12, 50, 0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(124,92,252,0.3);
    text-align: center;
    animation: slideUp 0.35s ease both;
  }
  #ios-bar strong { color: var(--text); font-size: 15px; display: block; margin-bottom: 4px; }
  #ios-bar span { color: var(--muted); font-size: 13px; font-family: -apple-system, sans-serif; line-height: 1.5; }
  #ios-bar button {
    background: var(--accent);
    color: #fff; border: none;
    padding: 10px 24px; border-radius: 30px;
    font-weight: 700; font-size: 13px;
    cursor: pointer; align-self: center;
    font-family: -apple-system, sans-serif;
  }

  /* ── IFRAME ── */
  #game-frame {
    position: fixed;
    /* Push iframe behind the status bar using negative top offset */
    top: -env(safe-area-inset-top, 0px);
    left: 0; right: 0;
    bottom: 0;
    /* Extra height to compensate for the negative top */
    width: 100%;
    height: calc(100% + env(safe-area-inset-top, 0px));
    border: none;
    background: var(--bg);
    transition: height 0.3s, bottom 0.3s;
  }
</style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <div class="splash-cards">
    <div class="splash-card c1">-2</div>
    <div class="splash-card c2">8</div>
    <div class="splash-card c3">5</div>
    <div class="splash-card c4">0</div>
  </div>
  <div class="splash-title">Skyjo</div>
  <div class="splash-loader"></div>
</div>

<!-- Install bar (Android/Brave) -->
<div id="install-bar">
  <div class="install-icon">🃏</div>
  <div class="install-text">
    <strong>Installer Skyjo</strong>
    <span>Ajouter à l'écran d'accueil</span>
  </div>
  <button class="install-btn" id="install-btn">Installer</button>
  <button class="install-close" onclick="dismissInstall()">✕</button>
</div>

<!-- iOS install instructions -->
<div id="ios-bar">
  <div>
    <strong>📲 Installer sur iPhone</strong>
    <span>Appuyez sur <b>□↑</b> (Partager) puis <b>"Sur l'écran d'accueil"</b></span>
  </div>
  <button onclick="document.getElementById('ios-bar').style.display='none'">OK compris</button>
</div>

<!-- Game iframe -->
<iframe
  id="game-frame"
  src="https://pneubis.github.io/skyjo"
  allow="fullscreen; notifications"
  allowfullscreen
></iframe>

<script>

  start_url: "./",
  display: "fullscreen",
  background_color: "#1a1035",
  theme_color: "#1a1035",
  orientation: "any",
  icons: [
    {
      src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgcng9IjM4IiBmaWxsPSIjMWExMDM1Ii8+PHJlY3QgeD0iMjAiIHk9IjIwIiB3aWR0aD0iNjgiIGhlaWdodD0iOTYiIHJ4PSIxMiIgZmlsbD0iI2ZmZiIvPjxyZWN0IHg9IjEwNCIgeT0iMjAiIHdpZHRoPSI2OCIgaGVpZ2h0PSI5NiIgcng9IjEyIiBmaWxsPSIjZmY1ZDVkIi8+PHJlY3QgeD0iMjAiIHk9Ijc2IiB3aWR0aD0iNjgiIGhlaWdodD0iOTYiIHJ4PSIxMiIgZmlsbD0iIzVkYjVmZiIvPjxyZWN0IHg9IjEwNCIgeT0iNzYiIHdpZHRoPSI2OCIgaGVpZ2h0PSI5NiIgcng9IjEyIiBmaWxsPSIjNmRmZjkzIi8+PHRleHQgeD0iNTQiIHk9IjczIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iR2VvcmdpYSIgZm9udC13ZWlnaHQ9IjcwMCIgZm9udC1zaXplPSIzMiIgZmlsbD0iIzFhMTAzNSI+LTI8L3RleHQ+PHRleHQgeD0iMTM4IiB5PSI3MyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9Ikdlb3JnaWEiIGZvbnQtd2VpZ2h0PSI3MDAiIGZvbnQtc2l6ZT0iMzIiIGZpbGw9IndoaXRlIj44PC90ZXh0Pjx0ZXh0IHg9IjU0IiB5PSIxNjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhIiBmb250LXdlaWdodD0iNzAwIiBmb250LXNpemU9IjMyIiBmaWxsPSJ3aGl0ZSI+NTwvdGV4dD48dGV4dCB4PSIxMzgiIHk9IjE2MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9Ikdlb3JnaWEiIGZvbnQtd2VpZ2h0PSI3MDAiIGZvbnQtc2l6ZT0iMzIiIGZpbGw9IiMxYTEwMzUiPjA8L3RleHQ+PC9zdmc+",
      sizes: "192x192",
      type: "image/svg+xml",
      purpose: "any maskable"
    },
    {
      src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjEwMCIgZmlsbD0iIzFhMTAzNSIvPjxyZWN0IHg9IjUwIiB5PSI1MCIgd2lkdGg9IjE4MCIgaGVpZ2h0PSIyNTYiIHJ4PSIyOCIgZmlsbD0iI2ZmZiIvPjxyZWN0IHg9IjI4MiIgeT0iNTAiIHdpZHRoPSIxODAiIGhlaWdodD0iMjU2IiByeD0iMjgiIGZpbGw9IiNmZjVkNWQiLz48cmVjdCB4PSI1MCIgeT0iMjA2IiB3aWR0aD0iMTgwIiBoZWlnaHQ9IjI1NiIgcng9IjI4IiBmaWxsPSIjNWRiNWZmIi8+PHJlY3QgeD0iMjgyIiB5PSIyMDYiIHdpZHRoPSIxODAiIGhlaWdodD0iMjU2IiByeD0iMjgiIGZpbGw9IiM2ZGZmOTMiLz48dGV4dCB4PSIxNDAiIHk9IjE5OCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9Ikdlb3JnaWEiIGZvbnQtd2VpZ2h0PSI3MDAiIGZvbnQtc2l6ZT0iOTYiIGZpbGw9IiMxYTEwMzUiPi0yPC90ZXh0Pjx0ZXh0IHg9IjM3MiIgeT0iMTk4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iR2VvcmdpYSIgZm9udC13ZWlnaHQ9IjcwMCIgZm9udC1zaXplPSI5NiIgZmlsbD0id2hpdGUiPjg8L3RleHQ+PHRleHQgeD0iMTQwIiB5PSI0MjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhIiBmb250LXdlaWdodD0iNzAwIiBmb250LXNpemU9Ijk2IiBmaWxsPSJ3aGl0ZSI+NTwvdGV4dD48dGV4dCB4PSIzNzIiIHk9IjQyMCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9Ikdlb3JnaWEiIGZvbnQtd2VpZ2h0PSI3MDAiIGZvbnQtc2l6ZT0iOTYiIGZpbGw9IiMxYTEwMzUiPjA8L3RleHQ+PC9zdmc+",
      sizes: "512x512",
      type: "image/svg+xml",
      purpose: "any maskable"
    }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
document.getElementById('manifest-placeholder').href = URL.createObjectURL(manifestBlob);

// ── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'skyjo-pwa-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const swBlob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}

// ── SPLASH → hide when iframe loaded ────────────────────────────
const frame = document.getElementById('game-frame');
const splash = document.getElementById('splash');

let splashHidden = false;
function hideSplash() {
  if (splashHidden) return;
  splashHidden = true;
  splash.classList.add('hidden');
}

frame.addEventListener('load', () => setTimeout(hideSplash, 600));
setTimeout(hideSplash, 4000); // fallback

// ── INSTALL PROMPT (Android/Brave/Chrome) ───────────────────────
let deferredPrompt = null;
const installBar = document.getElementById('install-bar');
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    installBar.style.display = 'flex';
    // Push iframe up to make room for install bar, keeping status bar coverage
    frame.style.bottom = '90px';
    frame.style.height = 'calc(100% + env(safe-area-inset-top, 0px) - 90px)';
  }, 1500);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissInstall();
  if (outcome === 'accepted') showToast('🃏 Skyjo installé !');
});

window.addEventListener('appinstalled', () => {
  dismissInstall();
  showToast('🎉 Skyjo ajouté à l\'écran d\'accueil !');
});

function dismissInstall() {
  installBar.style.display = 'none';
  frame.style.bottom = '0';
  frame.style.height = 'calc(100% + env(safe-area-inset-top, 0px))';
}

// ── iOS detection ────────────────────────────────────────────────
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.navigator.standalone === true;
if (isIos && !isInStandalone) {
  setTimeout(() => {
    document.getElementById('ios-bar').style.display = 'flex';
    frame.style.height = 'calc(100% - 110px)';
  }, 2000);
}

// ── Toast helper ─────────────────────────────────────────────────

// ── REQUEST NATIVE FULLSCREEN on first interaction ───────────────
function requestFullscreen() {
  const el = document.documentElement;
  const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (rfs) {
    rfs.call(el).catch(() => {});
  }
  // Android immersive mode via screen.orientation lock
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('any').catch(() => {});
  }
}
// Trigger fullscreen on first user interaction (required by browsers)
let fsRequested = false;
document.addEventListener('click', () => {
  if (!fsRequested) { fsRequested = true; requestFullscreen(); }
}, { once: false });
document.addEventListener('touchstart', () => {
  if (!fsRequested) { fsRequested = true; requestFullscreen(); }
}, { once: false });
// Try immediately in case already in PWA standalone mode
if (window.matchMedia('(display-mode: standalone)').matches || 
    window.matchMedia('(display-mode: fullscreen)').matches) {
  requestFullscreen();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '100px', left: '50%',
    transform: 'translateX(-50%)',
    background: '#7c5cfc', color: '#fff',
    padding: '12px 24px', borderRadius: '30px',
    fontFamily: '-apple-system, sans-serif',
    fontWeight: '700', fontSize: '14px',
    zIndex: '9999', whiteSpace: 'nowrap',
    boxShadow: '0 4px 24px rgba(124,92,252,0.5)',
    transition: 'opacity 0.4s',
  });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2500);
}
</script>
</body>
</html>
